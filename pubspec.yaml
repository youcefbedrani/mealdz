name: meal_analyzer
description: AI-powered meal analysis app — MobileNetV2 on-device TFLite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # State management — Riverpod
  flutter_riverpod: ^2.5.1

  # On-device AI
  tflite_flutter: ^0.12.0
  image: ^4.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Camera & image
  image_picker: ^1.1.0
  camera: ^0.11.0

  # Networking
  http: ^1.2.0

  # UI
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/data/
    - assets/labels/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/meal_logo.png"
  min_sdk_android: 21
